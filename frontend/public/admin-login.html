<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Knotxme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header-mount"></div>

<main>
  <div class="auth-shell">
    <div class="auth-card reveal in" style="border-color:var(--ink);">
      <div class="eyebrow">Restricted access</div>
      <h1>Admin Login</h1>
      <p class="auth-sub">This login is separate from brand and creator accounts.</p>

      <form id="adminLoginForm" style="margin-top:22px;">
        <div class="form-field">
          <label for="email">Admin Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">Log In as Admin</button>
        <div class="auth-error" id="adminError"></div>
      </form>

      <p class="auth-foot">
        <a href="login.html">← Brand / Creator login</a>
      </p>
    </div>
  </div>
</main>

<div id="site-footer-mount"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/partials.js"></script>
<script src="js/auth-nav.js"></script>
<script>
  document.getElementById("adminLoginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("adminError");
    errEl.classList.remove("show");

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const res = await window.KnotxmeAPI.adminLogin({ email, password });
      window.KnotxmeAPI.setSession(res.token, res.user);
      window.location.href = "admin-dashboard.html";
    } catch (err) {
      errEl.textContent = (err.data && err.data.message) || "Invalid admin credentials.";
      errEl.classList.add("show");
    }
  });
</script>
</body>
</html>
