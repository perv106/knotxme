<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Knotxme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header-mount"></div>

<main>
  <div class="auth-shell">
    <div class="auth-card reveal in">
      <div class="eyebrow">Account recovery</div>
      <h1>Forgot your password?</h1>
      <p class="auth-sub">Enter the email on your account. We'll send a link to reset your password.</p>

      <form id="forgotForm" style="margin-top:22px;">
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
        <div class="auth-error" id="forgotError"></div>
        <div class="auth-success" id="forgotSuccess"></div>
      </form>

      <p class="auth-foot">
        <a href="login.html">← Back to login</a>
      </p>
    </div>
  </div>
</main>

<div id="site-footer-mount"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/partials.js"></script>
<script src="js/auth-nav.js"></script>
<script>
  document.getElementById("forgotForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("forgotError");
    const okEl = document.getElementById("forgotSuccess");
    errEl.classList.remove("show");
    okEl.classList.remove("show");
    const email = document.getElementById("email").value.trim();

    try {
      await window.KnotxmeAPI.forgotPassword({ email });
      okEl.textContent = "If an account exists for that email, a reset link has been sent.";
      okEl.classList.add("show");
    } catch (err) {
      // Same message regardless, so we never reveal whether an email exists
      okEl.textContent = "If an account exists for that email, a reset link has been sent.";
      okEl.classList.add("show");
    }
  });
</script>
</body>
</html>
