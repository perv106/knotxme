<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Knotxme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header-mount"></div>

<main>
  <div class="auth-shell">
    <div class="auth-card reveal in">
      <div class="eyebrow">Welcome back</div>
      <h1>Log in to Knotxme</h1>
      <p class="auth-sub">Access your brand or creator dashboard.</p>

      <div class="auth-role-tabs" id="roleTabs">
        <button type="button" data-role="brand" class="active">Brand</button>
        <button type="button" data-role="creator">Creator</button>
      </div>

      <form id="loginForm" style="margin-top:22px;">
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">Log In</button>
        <div class="auth-error" id="loginError"></div>
      </form>

      <p class="auth-foot">
        <a href="forgot-password.html">Forgot your password?</a>
      </p>
      <p class="auth-foot">
        New here? <a href="signup.html">Create an account</a>
      </p>
      <p class="auth-foot" style="margin-top:6px;">
        <a href="admin-login.html">Admin login →</a>
      </p>
    </div>
  </div>
</main>

<div id="site-footer-mount"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/partials.js"></script>
<script src="js/auth-nav.js"></script>
<script>
  let selectedRole = "brand";
  document.getElementById("roleTabs").addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-role]");
    if (!btn) return;
    selectedRole = btn.dataset.role;
    document.querySelectorAll("#roleTabs button").forEach((b) => b.classList.toggle("active", b === btn));
  });

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("loginError");
    errEl.classList.remove("show");

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const res = await window.KnotxmeAPI.login({ email, password, role: selectedRole });
      window.KnotxmeAPI.setSession(res.token, res.user);
      window.location.href = res.user.role === "brand" ? "brand-dashboard.html" : "creator-dashboard.html";
    } catch (err) {
      errEl.textContent = (err.data && err.data.message) || "Login failed. Check your email, password and role.";
      errEl.classList.add("show");
    }
  });
</script>
</body>
</html>
