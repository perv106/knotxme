<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Knotxme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header-mount"></div>

<main>
  <div class="auth-shell">
    <div class="auth-card reveal in">
      <div class="eyebrow">Account recovery</div>
      <h1>Set a new password</h1>
      <p class="auth-sub">Choose a new password for your account.</p>

      <form id="resetForm" style="margin-top:22px;">
        <div class="form-field">
          <label for="password">New Password</label>
          <input type="password" id="password" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-field">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary">Reset Password</button>
        <div class="auth-error" id="resetError"></div>
        <div class="auth-success" id="resetSuccess"></div>
      </form>

      <p class="auth-foot">
        <a href="login.html">← Back to login</a>
      </p>
    </div>
  </div>
</main>

<div id="site-footer-mount"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/partials.js"></script>
<script src="js/auth-nav.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  document.getElementById("resetForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("resetError");
    const okEl = document.getElementById("resetSuccess");
    errEl.classList.remove("show");
    okEl.classList.remove("show");

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (!token) {
      errEl.textContent = "This reset link is invalid or missing a token. Please request a new one.";
      errEl.classList.add("show");
      return;
    }
    if (password !== confirmPassword) {
      errEl.textContent = "Passwords do not match.";
      errEl.classList.add("show");
      return;
    }

    try {
      await window.KnotxmeAPI.resetPassword({ token, password });
      okEl.textContent = "Password updated. Redirecting to login…";
      okEl.classList.add("show");
      setTimeout(() => (window.location.href = "login.html"), 1200);
    } catch (err) {
      errEl.textContent = (err.data && err.data.message) || "This reset link is invalid or has expired.";
      errEl.classList.add("show");
    }
  });
</script>
</body>
</html>
